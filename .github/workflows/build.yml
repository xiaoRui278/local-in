name: Build

on:
  push:
    branches: [main, master, develop, 'feature/**']
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos-aarch64
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: macos-x86_64
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Find artifacts
        id: find-artifacts
        shell: bash
        run: |
          echo "Looking for build artifacts..."
          find src-tauri/target -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" 2>/dev/null | head -20

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Local-In-Windows
          path: |
            src-tauri/target/**/*.msi
            src-tauri/target/**/*.exe
          if-no-files-found: warn

      - name: Upload macOS aarch64 artifacts
        if: matrix.target == 'macos-aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: Local-In-macOS-AppleSilicon
          path: src-tauri/target/**/*.dmg
          if-no-files-found: warn

      - name: Upload macOS x86_64 artifacts
        if: matrix.target == 'macos-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: Local-In-macOS-Intel
          path: src-tauri/target/**/*.dmg
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: Local-In-Linux
          path: |
            src-tauri/target/**/*.deb
            src-tauri/target/**/*.AppImage
          if-no-files-found: warn
