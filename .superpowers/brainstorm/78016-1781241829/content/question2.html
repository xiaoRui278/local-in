<h2>问题2：头像与改名</h2>
<p class="subtitle">是否需要头像和修改昵称功能</p>

<div class="section">
  <div class="options">
    <div class="option" data-choice="avatar-yes" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>头像 + 改名</h3>
        <p>支持自定义头像和随时修改昵称</p>
      </div>
    </div>
    <div class="option" data-choice="avatar-no" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>仅改名</h3>
        <p>不设头像，只支持修改昵称</p>
      </div>
    </div>
    <div class="option" data-choice="none" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>都不需要</h3>
        <p>首次设定后不再修改</p>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <p class="label">上一题结果</p>
  <p>✅ 名字唯一性：采用<strong>自动后缀</strong>方案（重名自动加数字）</p>
</div>

<div class="section">
  <p class="label">请在终端回答</p>

</div>
