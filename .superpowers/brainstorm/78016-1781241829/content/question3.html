<h2>问题3：隐私保护</h2>
<p class="subtitle">是否隐藏IP地址和Peer ID</p>

<div class="section">
  <div class="options">
    <div class="option" data-choice="hide-all" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>全部隐藏</h3>
        <p>只显示昵称和头像，不显示任何技术标识</p>
      </div>
    </div>
    <div class="option" data-choice="hide-ip" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>隐藏IP</h3>
        <p>隐藏IP地址，保留Peer ID前几位用于调试</p>
      </div>
    </div>
    <div class="option" data-choice="show-all" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>全部显示</h3>
        <p>保留当前设计，显示Peer ID</p>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <p class="label">已确认</p>
  <p>✅ 问题1：自动后缀<br>✅ 问题2：头像+改名</p>
</div>

<div class="section">
  <p class="label">请在终端回答</p>
  <p>你倾向哪种隐私方案？</p>
</div>
